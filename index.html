<title>明日航线 · Tomorrow's Route</title>
<style>
:root{--coral:#ff8a7a;--coral-d:#e76b5e;--mint:#a8d8c8;--mint-d:#6fbfa8;--laven:#c8b8e0;--laven-d:#9d8bc4;--paper:#fdfaf3;--ink:#3a3a3a;--sub:#7a7268;--soft:#f5ede0;--line:#e3d8c5;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:radial-gradient(circle at 20% 10%,rgba(255,138,122,.08),transparent 40%),radial-gradient(circle at 80% 90%,rgba(168,216,200,.10),transparent 40%),var(--paper);color:var(--ink);overflow-x:hidden;line-height:1.55;}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding:14px;display:flex;flex-direction:column;gap:12px;}
.topbar{background:linear-gradient(135deg,#fff,#fbf5e8);border:1px solid var(--line);border-radius:18px;padding:10px 14px;box-shadow:0 2px 8px rgba(0,0,0,.04);display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;font-size:13px;}
.topbar .row{display:flex;justify-content:space-between;align-items:center;}
.topbar .label{color:var(--sub);font-size:11px;}
.topbar .val{font-weight:600;}
.bar-wrap{height:5px;background:#efe5d4;border-radius:3px;overflow:hidden;margin-top:3px;}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--mint),var(--mint-d));transition:width .4s;}
.bar-fill.coral{background:linear-gradient(90deg,#ffb3a8,var(--coral-d));}
.bar-fill.laven{background:linear-gradient(90deg,#e0d4f0,var(--laven-d));}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.04);}
.card h3{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.card .hint{color:var(--sub);font-size:12px;margin-bottom:10px;}
.btn{display:block;width:100%;background:linear-gradient(135deg,var(--coral),var(--coral-d));color:#fff;border:none;border-radius:14px;padding:13px 16px;font-size:14px;font-weight:600;cursor:pointer;transition:transform .15s;box-shadow:0 3px 0 #c95a4f;}
.btn:active{transform:translateY(2px);box-shadow:0 1px 0 #c95a4f;}
.btn.mint{background:linear-gradient(135deg,var(--mint),var(--mint-d));box-shadow:0 3px 0 #4f9c87;}
.btn.laven{background:linear-gradient(135deg,var(--laven),var(--laven-d));box-shadow:0 3px 0 #7e6cab;}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);box-shadow:none;font-weight:500;}
.btn.small{padding:8px 12px;font-size:13px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
.btn-row .btn{flex:1;}
.event{background:linear-gradient(135deg,#fffaf3,#fff);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px;}
.event .tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;background:var(--soft);color:var(--sub);margin-right:6px;}
.event .tag.limited{background:#ffe6e0;color:var(--coral-d);}
.event .tag.hidden{background:#e8dff5;color:var(--laven-d);}
.event .tag.daily{background:#e0f0e8;color:var(--mint-d);}
.event-title{font-size:14px;font-weight:600;margin:4px 0;}
.event-desc{font-size:13px;color:var(--sub);margin-bottom:10px;line-height:1.55;}
.event-cost{font-size:11px;color:var(--coral-d);margin-bottom:8px;}
.choices{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.choice{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:13px;cursor:pointer;transition:all .15s;text-align:left;}
.choice:hover{border-color:var(--coral);background:#fff8f5;}
.choice .label{font-weight:600;margin-bottom:4px;}
.choice .hint{color:var(--sub);font-size:11px;}
.dialog{background:linear-gradient(135deg,#fff,#fffaf3);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:10px;}
.dialog .npc{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.npc-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--mint),var(--laven));display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;flex-shrink:0;}
.npc-name{font-weight:600;font-size:13px;}
.npc-role{font-size:11px;color:var(--sub);}
.dialog-text{font-size:14px;line-height:1.6;}
.dialog-text::before{content:'❝ ';color:var(--coral);font-size:18px;}
.feedback{background:linear-gradient(135deg,#fff8f5,#fff);border:1px dashed var(--coral);border-radius:14px;padding:12px;margin:10px 0;font-size:13px;}
.feedback .changes{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.chg{font-size:11px;padding:3px 8px;border-radius:8px;background:var(--soft);color:var(--ink);}
.chg.up{background:#e0f0e8;color:#2d8a6e;}
.chg.down{background:#fde3de;color:var(--coral-d);}
canvas{display:block;margin:0 auto;}
.stats-row{display:flex;gap:8px;margin-top:8px;}
.stats-block{flex:1;text-align:center;}
.stats-block .title{font-size:12px;color:var(--sub);margin-bottom:4px;}
.tabs{display:flex;gap:4px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:4px;margin-top:auto;box-shadow:0 -2px 8px rgba(0,0,0,.03);position:sticky;bottom:8px;}
.tab{flex:1;text-align:center;padding:10px 4px;font-size:12px;color:var(--sub);border-radius:10px;cursor:pointer;transition:all .2s;}
.tab.active{background:linear-gradient(135deg,var(--coral),var(--coral-d));color:#fff;font-weight:600;}
.tab-icon{font-size:18px;display:block;margin-bottom:2px;}
.diary-entry{background:#fffaf0;border-left:3px solid var(--laven-d);border-radius:0 12px 12px 0;padding:10px 12px;margin-bottom:8px;}
.diary-entry .meta{font-size:11px;color:var(--sub);margin-bottom:4px;}
.diary-entry .text{font-size:13px;line-height:1.6;}
.diary-entry .mood{font-size:11px;margin-top:6px;display:inline-block;padding:2px 8px;border-radius:8px;background:var(--soft);}
.npc-card{display:flex;align-items:center;gap:10px;background:#fffaf0;border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:8px;}
.npc-card .info{flex:1;}
.npc-card .name{font-weight:600;font-size:13px;}
.npc-card .desc{font-size:11px;color:var(--sub);}
.heart-bar{height:4px;background:#efe5d4;border-radius:2px;overflow:hidden;margin-top:4px;width:100%;}
.heart-fill{height:100%;background:linear-gradient(90deg,#ffc8c0,var(--coral-d));}
.intro{text-align:center;padding:40px 20px;background:linear-gradient(180deg,rgba(255,138,122,.05),rgba(168,216,200,.08));border-radius:24px;border:1px solid var(--line);}
.intro h1{font-size:28px;margin-bottom:8px;letter-spacing:2px;background:linear-gradient(135deg,var(--coral-d),var(--laven-d));-webkit-background-clip:text;background-clip:text;color:transparent;}
.intro .en{color:var(--sub);font-size:13px;letter-spacing:3px;margin-bottom:24px;}
.intro .quote{font-size:13px;color:var(--sub);margin:24px 0;padding:0 8px;line-height:1.8;}
.input-name{width:100%;border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px 16px;font-size:14px;margin:16px 0;text-align:center;font-family:inherit;color:var(--ink);}
.input-name:focus{outline:none;border-color:var(--coral);}
.feature-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:20px 0;}
.feature{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center;}
.feature .ic{font-size:22px;margin-bottom:4px;}
.feature .lb{font-size:12px;font-weight:600;}
.feature .ds{font-size:10px;color:var(--sub);margin-top:2px;}
.map-section{background:linear-gradient(135deg,#fffaf3,#fff,#f9f3ff);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px;}
.map-title{font-size:18px;font-weight:600;text-align:center;margin-bottom:8px;background:linear-gradient(135deg,var(--coral-d),var(--laven-d));-webkit-background-clip:text;background-clip:text;color:transparent;}
.path-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px;}
.path-card .name{font-weight:600;font-size:13px;color:var(--coral-d);}
.path-card .desc{font-size:12px;color:var(--sub);margin-top:4px;line-height:1.6;}
@keyframes fadein{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:fadein .4s ease-out;}
textarea.reflect{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;font-family:inherit;font-size:13px;resize:none;background:#fffaf0;color:var(--ink);}
textarea.reflect:focus{outline:none;border-color:var(--laven-d);}
.credit{text-align:center;font-size:10px;color:var(--sub);padding:8px;opacity:.6;}
</style>
</head>

function reset(){if(confirm('确定重新开始？当前进度会消失')){S=initState();save();render();}}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function moodEmoji(m){if(m>=8)return'✨';if(m>=6)return'🙂';if(m>=4)return'😐';if(m>=2)return'😶‍🌫️';return'🥲';}
function applyEffects(eff){if(!eff)return[];const c=[];Object.entries(eff).forEach(([k,v])=>{if(k==='mood'){S.mood=clamp(S.mood+v,0,10);c.push({k:'心情',v});}else if(k==='energy'){S.energy=clamp(S.energy+v,0,10);c.push({k:'精力',v});}else if(k==='money'){S.money=Math.max(0,S.money+v);c.push({k:'生活费',v});}else if(k.endsWith('_like')){const id=k.replace('_like','');S.npc_likes[id]=clamp((S.npc_likes[id]||0)+v,0,10);c.push({k:NPCS[id].name+'好感',v});}else if(S.abilities[k]!==undefined){S.abilities[k]=clamp(S.abilities[k]+v,0,10);c.push({k,v});}else if(S.values[k]!==undefined){S.values[k]=clamp(S.values[k]+v,0,10);c.push({k,v});}});return c;}
function semEvents(){const sem=SEMESTERS[S.semIdx].id;return EVENTS.filter(e=>e.sem.includes(sem));}
function drawRadar(canvas,data,color,labels){const ctx=canvas.getContext('2d');const W=canvas.width,H=canvas.height;const cx=W/2,cy=H/2,R=Math.min(W,H)/2-30;ctx.clearRect(0,0,W,H);const n=labels.length;for(let r=1;r<=5;r++){ctx.beginPath();for(let i=0;i<n;i++){const a=-Math.PI/2+i*Math.PI*2/n;const x=cx+Math.cos(a)*R*r/5,y=cy+Math.sin(a)*R*r/5;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.closePath();ctx.strokeStyle='#e3d8c5';ctx.lineWidth=.8;ctx.stroke();}for(let i=0;i<n;i++){const a=-Math.PI/2+i*Math.PI*2/n;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);ctx.strokeStyle='#efe5d4';ctx.lineWidth=.8;ctx.stroke();}ctx.beginPath();for(let i=0;i<n;i++){const a=-Math.PI/2+i*Math.PI*2/n;const v=clamp(data[i],0,10)/10;const x=cx+Math.cos(a)*R*v,y=cy+Math.sin(a)*R*v;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.closePath();ctx.fillStyle=color+'44';ctx.strokeStyle=color;ctx.lineWidth=1.8;ctx.fill();ctx.stroke();ctx.font='11px PingFang SC,sans-serif';ctx.fillStyle='#7a7268';ctx.textAlign='center';ctx.textBaseline='middle';for(let i=0;i<n;i++){const a=-Math.PI/2+i*Math.PI*2/n;const x=cx+Math.cos(a)*(R+16),y=cy+Math.sin(a)*(R+16);ctx.fillText(labels[i],x,y);}}
const app=document.getElementById('app');
function el(h){const d=document.createElement('div');d.innerHTML=h;return d.firstElementChild;}
function renderIntro(){app.innerHTML='';const hasProgress=S.semIdx>0||S.history.length>0||S.done;const intro=el(`<div class="intro fade"><h1>明日航线</h1><div class="en">TOMORROW'S ROUTE</div><div class="quote">让我看到未来仍有希望，看清自己真正在意的价值排序，<br>不被「正确标准」牵着走，<br>选错也能重来。</div><div class="feature-row"><div class="feature"><div class="ic">🧭</div><div class="lb">可试错</div><div class="ds">无 Game Over</div></div><div class="feature"><div class="ic">🌱</div><div class="lb">可体验</div><div class="ds">4 年 16 学期</div></div><div class="feature"><div class="ic">💫</div><div class="lb">可看见</div><div class="ds">价值观可视化</div></div><div class="feature"><div class="ic">🤝</div><div class="lb">被陪伴</div><div class="ds">NPC 情感支持</div></div></div><input class="input-name" id="nameInput" placeholder="给自己起个名字" maxlength="10" /><button class="btn" id="startBtn">入学 · 进入大一</button><div style="height:8px"></div>${hasProgress?`<button class="btn ghost" id="loadBtn">继续上次（${S.done?'已毕业':SEMESTERS[S.semIdx]?.label||''}）</button>`:''}</div><div class="credit">基于《明日航线》结课策划方案 v3 · 6 位大学生访谈驱动</div>`);app.appendChild(intro);document.getElementById('startBtn').onclick=()=>{const v=document.getElementById('nameInput').value.trim()||'我';S=initState();S.name=v;S.diary.push({sem:0,date:'入学第一天',mood:7,tag:'入学',text:`今天是开学第一天，${v} 拎着两个箱子站在宿舍楼下。`});save();render();};if(hasProgress)document.getElementById('loadBtn').onclick=()=>render();}
function render(){if(S.done){renderFuture();return;}if(!S.name){renderIntro();return;}if(S.semIdx>=SEMESTERS.length){S.done=true;save();renderFuture();return;}app.innerHTML='';app.appendChild(renderTopbar());if(S.tab==='diary')app.appendChild(renderDiaryTab());else if(S.tab==='relation')app.appendChild(renderRelationTab());else if(S.tab==='future')app.appendChild(renderFuturePreview());else renderMainTab();app.appendChild(renderTabs());}
function renderTopbar(){const sem=SEMESTERS[S.semIdx];return el(`<div class="topbar fade"><div class="row" style="grid-column:1/-1"><div><span class="label">学期</span> <span class="val">${sem.label}</span></div><div style="font-size:11px;color:var(--sub)">${sem.tagline}</div></div><div><div class="row"><span class="label">精力</span><span class="val">${S.energy}/10</span></div><div class="bar-wrap"><div class="bar-fill mint" style="width:${S.energy*10}%"></div></div></div><div><div class="row"><span class="label">心情</span><span class="val">${moodEmoji(S.mood)} ${S.mood}/10</span></div><div class="bar-wrap"><div class="bar-fill laven" style="width:${S.mood*10}%"></div></div></div><div class="row" style="grid-column:1/-1"><div><span class="label">生活费</span> <span class="val">¥${S.money}</span></div><div><span class="label">玩家</span> <span class="val">${S.name}</span></div></div></div>`);}
function renderMainTab(){const radarCard=el(`<div class="card fade"><h3>🧭 你的现在</h3><div class="hint">能力 = 你会什么 · 价值观 = 你在乎什么</div><div class="stats-row"><div class="stats-block"><div class="title">能力树</div><canvas id="abilityRadar" width="200" height="180"></canvas></div><div class="stats-block"><div class="title">价值观罗盘</div><canvas id="valueRadar" width="200" height="180"></canvas></div></div></div>`);app.appendChild(radarCard);const evCard=el(`<div class="card fade"><h3>📌 本学期的选择</h3><div class="hint">精力允许范围内自由选 · 选完按底部按钮进入下一学期</div><div id="eventList"></div><button class="btn mint small" id="nextSem" style="margin-top:12px">▶ 进入下一学期</button></div>`);app.appendChild(evCard);const evList=document.getElementById('eventList');semEvents().forEach(e=>{const used=S.history.find(h=>h.eventId===e.id&&h.sem===S.semIdx);const card=el(`<div class="event" style="${used?'opacity:.5;':''}"><div><span class="tag ${e.type}">${e.type==='daily'?'日常':e.type==='limited'?'限时':'隐藏'}</span>${used?'<span class="tag">已选</span>':''}</div><div class="event-title">${e.title}</div><div class="event-desc">${e.desc}</div><div class="event-cost">需 精力 ${e.cost?.energy||0}${e.cost?.money?(' · 钱 '+e.cost.money):''}</div><div class="choices"></div></div>`);evList.appendChild(card);const choices=card.querySelector('.choices');e.choices.forEach((c,idx)=>{const can=!used&&S.energy+(e.cost?.energy||0)>=0&&S.money+(e.cost?.money||0)>=0;const btn=el(`<button class="choice" ${can?'':'disabled style="opacity:.4;cursor:not-allowed"'}><div class="label">${c.label}</div><div class="hint">${c.desc||''}</div></button>`);btn.onclick=()=>{if(can)pickEvent(e,idx);};choices.appendChild(btn);});});document.getElementById('nextSem').onclick=nextSemester;setTimeout(()=>{const ab=ABILITIES.map(a=>S.abilities[a.n]);const vl=VALUES.map(v=>S.values[v.n]);drawRadar(document.getElementById('abilityRadar'),ab,'#e76b5e',ABILITIES.map(a=>a.n));drawRadar(document.getElementById('valueRadar'),vl,'#9d8bc4',VALUES.map(v=>v.n));},0);}
function pickEvent(ev,idx){const cost=ev.cost||{};if(cost.energy)S.energy=clamp(S.energy+cost.energy,0,10);if(cost.money)S.money=Math.max(0,S.money+cost.money);if(cost.mood)S.mood=clamp(S.mood+cost.mood,0,10);const c=ev.choices[idx];const changes=applyEffects(c.effects||{});S.history.push({sem:S.semIdx,eventId:ev.id,choice:idx,label:c.label});if(c.note){S.diary.push({sem:S.semIdx,date:`${SEMESTERS[S.semIdx].label} · ${ev.title}`,mood:S.mood,tag:c.label.slice(0,6),text:c.note});}save();app.innerHTML='';app.appendChild(renderTopbar());const fb=el(`<div class="card fade" style="border:2px solid var(--coral)"><h3>📖 反馈</h3><div style="font-size:14px;line-height:1.7;margin-bottom:10px">${c.note||'选择已记录'}</div><div class="feedback"><div style="font-weight:600;font-size:12px;margin-bottom:4px">这一步改变了什么</div><div class="changes">${changes.map(ch=>`<span class="chg ${ch.v>0?'up':'down'}">${ch.k} ${ch.v>0?'+':''}${ch.v}</span>`).join('')||'<span class="chg">无明显变化</span>'}</div></div><button class="btn" id="contBtn">继续</button></div>`);app.appendChild(fb);app.appendChild(renderTabs());document.getElementById('contBtn').onclick=render;}
function nextSemester(){const isYearEnd=(S.semIdx+1)%4===0||S.semIdx===SEMESTERS.length-1;if(isYearEnd){renderReflect();return;}doAdvance();}
function doAdvance(){S.energy=clamp(S.energy+5,0,10);S.money=Math.min(2000,S.money+300);S.mood=clamp(S.mood+1,0,10);S.semIdx+=1;save();if(S.semIdx>=SEMESTERS.length){S.done=true;save();renderFuture();return;}render();}
function renderReflect(){const sem=SEMESTERS[S.semIdx];const top=topAbility();const topV=topValue();app.innerHTML='';app.appendChild(renderTopbar());const r=el(`<div class="card fade"><h3>📔 学年回顾 · ${sem.label}</h3><div class="dialog"><div class="npc"><div class="npc-avatar" style="background:linear-gradient(135deg,#a8d8c8,#6fbfa8)">🌿</div><div><div class="npc-name">林学姐</div><div class="npc-role">导师</div></div></div><div class="dialog-text">这一学年走完了。我看到你 ${top.name}涨得最快（${top.val}/10），${topV.name}也开始变得清晰。重要的不是你做对了什么——重要的是你发现了什么关于自己的新事实。</div></div><div style="margin:12px 0 6px;font-size:13px;color:var(--sub)">如果你想，写一句给自己看的话：</div><textarea class="reflect" id="refTxt" rows="3" placeholder="（可以留空，按继续跳过）"></textarea><div style="height:10px"></div><button class="btn" id="refBtn">写完，继续往前走 →</button></div>`);app.appendChild(r);app.appendChild(renderTabs());document.getElementById('refBtn').onclick=()=>{const t=document.getElementById('refTxt').value.trim();if(t){S.diary.push({sem:S.semIdx,date:sem.label+' · 学年总结',mood:S.mood,tag:'反思',text:t});save();}doAdvance();};}
function renderDiaryTab(){const w=el(`<div class="card fade"><h3>📖 我的日记</h3><div class="hint">关键节点 + 心情标签 · 共 ${S.diary.length} 条</div><div id="diaryList"></div></div>`);const list=w.querySelector('#diaryList');if(S.diary.length===0){list.innerHTML='<div class="hint" style="padding:20px;text-align:center">还没有记录。先去做点选择吧。</div>';}else{[...S.diary].reverse().forEach(d=>{list.appendChild(el(`<div class="diary-entry"><div class="meta">${d.date}</div><div class="text">${d.text}</div><div class="mood">${moodEmoji(d.mood)} ${d.tag}</div></div>`));});}return w;}
function renderRelationTab(){const w=el(`<div class="card fade"><h3>💞 我的关系</h3><div class="hint">NPC 好感度（满 10）</div><div id="rList"></div></div>`);const list=w.querySelector('#rList');Object.entries(NPCS).forEach(([id,n])=>{const v=S.npc_likes[id]||0;list.appendChild(el(`<div class="npc-card"><div class="npc-avatar" style="background:linear-gradient(135deg,${n.color},#fff)">${n.emoji}</div><div class="info"><div class="name">${n.name}</div><div class="desc">${n.role}</div><div class="heart-bar"><div class="heart-fill" style="width:${v*10}%"></div></div></div><div style="font-weight:600;font-size:13px;color:var(--coral-d)">${v}/10</div></div>`));});return w;}
function renderFuturePreview(){const paths=predictPaths();const w=el(`<div class="card fade"><h3>🔮 未来预览</h3><div class="hint">根据你目前的能力 + 价值观，三条「如果继续这样」的路径推演</div><div id="pList"></div><div class="hint" style="margin-top:10px;font-size:11px">⚠ 不是预测，是镜子。你随时可以改变方向。</div></div>`);const list=w.querySelector('#pList');paths.forEach(p=>list.appendChild(el(`<div class="path-card"><div class="name">${p.icon} ${p.name}</div><div class="desc">${p.desc}</div></div>`)));return w;}
function renderTabs(){const tabs=[{id:'main',ic:'🗺️',name:'地图'},{id:'diary',ic:'📖',name:'日记'},{id:'relation',ic:'💞',name:'关系'},{id:'future',ic:'🔮',name:'未来'}];const bar=el(`<div class="tabs"></div>`);tabs.forEach(t=>{const i=el(`<div class="tab ${S.tab===t.id?'active':''}"><span class="tab-icon">${t.ic}</span>${t.name}</div>`);i.onclick=()=>{S.tab=t.id;save();render();};bar.appendChild(i);});return bar;}
function topAbility(){let m={name:'',val:0};ABILITIES.forEach(a=>{if(S.abilities[a.n]>m.val)m={name:a.n,val:S.abilities[a.n]};});return m;}
function topValue(){let m={name:'',val:0};VALUES.forEach(v=>{if(S.values[v.n]>m.val)m={name:v.n,val:S.values[v.n]};});return m;}
function predictPaths(){const top=topAbility().name;const map1={'学术':{icon:'📚',name:'研究 / 深造路径',desc:'你身上有可以沉下去的耐心。继续往学术里走，三到五年后你可能在某个细分领域里成为可以被引用的人。'},'社交':{icon:'🤝',name:'人际连接者路径',desc:'你能让人愿意打开自己。HR、产品经理、咨询、教育、社区运营都是天然舞台——你解决的是"人和人之间"的问题。'},'实践':{icon:'🛠️',name:'落地执行者路径',desc:'你信任"做出来"胜过"想清楚"。产品、运营、工程、创业团队的早期成员都需要你这种能把事跑通的能力。'},'创意':{icon:'🎨',name:'创作者路径',desc:'你看世界的方式和大多数人不太一样。设计、写作、影视、独立游戏、艺术——你的产出本身就是答案。'},'自我管理':{icon:'🧘',name:'长期主义者路径',desc:'你最大的优势是稳定地完成困难的事。任何需要"持续 5 年以上"的事——博士、独立开发者、作家、长期投资——你都能做。'}};const topv=topValue().name;const map2={'稳定':{icon:'🏠',name:'根扎深的人生',desc:'你在意"可以依靠的东西"。体制内、大公司核心岗、教师、医生这些路径会让你更踏实——稳定不是保守，是清楚自己想守护什么。'},'创造':{icon:'✨',name:'造物者人生',desc:'你想留下你做出来的东西。独立产品、原创作品、新公司、新方法论——选择能让你"出手就是你"的环境。'},'影响':{icon:'📣',name:'影响他人的人生',desc:'你在意"被看见"和"改变别人"。媒体、教育、政策、社群、KOL 都是你的母题——你的价值在传播半径里。'},'自主':{icon:'🌿',name:'自洽自由的人生',desc:'你不愿意被定义。自由职业、远程工作、跨界混搭、不打卡的生活——为这种自由付出的代价是你愿意付的。'},'利他':{icon:'🌻',name:'服务他人的人生',desc:'你在意"我帮过谁"。NGO、医疗、教育、心理支持、社会企业——你做事的意义来自于另一端的人。'}};const sortedA=[...ABILITIES].map(a=>({k:a.n,v:S.abilities[a.n]})).sort((a,b)=>b.v-a.v);const second=sortedA[1]?.k||'社交';return[map1[top]||{icon:'🌱',name:'通才路径',desc:'你的能力还在均衡发育。'},map2[topv]||{icon:'🧭',name:'寻找意义的人生',desc:'你的价值观还在形成中。'},{icon:'🔀',name:`跨界组合：${top} × ${second}`,desc:`你不一定要选单一方向。最有意思的可能性常常在两个能力的交叉点上——${top}+${second}的组合可以让你做${top}的人做不了的事，也做${second}的人做不到的深度。`}];}
function renderFuture(){app.innerHTML='';const paths=predictPaths();const top=topAbility(),topv=topValue();const turning=S.history.filter(h=>['transfer_decide','first_intern','big_choice','final_reflect'].includes(h.eventId));app.appendChild(el(`<div class="map-section fade"><div class="map-title">📜 ${S.name} 的未来地图</div><div style="text-align:center;color:var(--sub);font-size:12px">四年走完了。这不是终点，是地图。</div></div>`));const radar=el(`<div class="card fade"><h3>🧭 你的画像</h3><div class="stats-row"><div class="stats-block"><div class="title">能力雷达（最终形态）</div><canvas id="finalA" width="210" height="190"></canvas></div><div class="stats-block"><div class="title">价值观罗盘（最终形态）</div><canvas id="finalV" width="210" height="190"></canvas></div></div><div class="feedback"><div style="font-weight:600;margin-bottom:6px">📌 关键发现</div><div style="font-size:13px;line-height:1.7">· 最突出的能力是 <b style="color:var(--coral-d)">${top.name}</b>（${top.val}/10）<br>· 最在意的是 <b style="color:var(--laven-d)">${topv.name}</b>（${topv.val}/10）<br>· 心情终值 ${moodEmoji(S.mood)} ${S.mood}/10 · 共记录 ${S.diary.length} 条日记 · 经历 ${S.history.length} 次选择</div></div></div>`);app.appendChild(radar);if(turning.length){const t=el(`<div class="card fade"><h3>🔖 关键转折</h3><div class="hint">这几个选择最大地塑造了你</div><div id="turnList"></div></div>`);const tl=t.querySelector('#turnList');turning.forEach(it=>{const ev=EVENTS.find(e=>e.id===it.eventId);tl.appendChild(el(`<div class="diary-entry"><div class="meta">${SEMESTERS[it.sem].label}</div><div class="text"><b>${ev.title}</b> → ${it.label}</div></div>`));});app.appendChild(t);}const pc=el(`<div class="card fade"><h3>🌅 「如果继续这样」三条路径</h3><div class="hint">不是预测，是镜子。你随时可以改变方向。</div><div id="pathFinal"></div></div>`);const pf=pc.querySelector('#pathFinal');paths.forEach(p=>pf.appendChild(el(`<div class="path-card"><div class="name">${p.icon} ${p.name}</div><div class="desc">${p.desc}</div></div>`)));app.appendChild(pc);const ending=el(`<div class="card fade" style="text-align:center;background:linear-gradient(135deg,#fffaf3,#f9f3ff)"><h3 style="justify-content:center">💌</h3><div style="font-size:14px;line-height:1.8">${S.name}，<br>告诉你的不是该做什么工作，<br>而是：你关心什么、擅长什么、愿意为什么付出。<br><br><i style="color:var(--sub);font-size:12px">— 林学姐</i></div><div style="height:14px"></div><div class="btn-row"><button class="btn mint small" id="exportBtn">📥 导出地图 (PNG)</button><button class="btn laven small" id="restartBtn">🔄 重玩一次</button></div></div><div class="credit">《明日航线》Tomorrow's Route · 基于结课策划方案 v3</div>`);app.appendChild(ending);setTimeout(()=>{const ab=ABILITIES.map(a=>S.abilities[a.n]);const vl=VALUES.map(v=>S.values[v.n]);drawRadar(document.getElementById('finalA'),ab,'#e76b5e',ABILITIES.map(a=>a.n));drawRadar(document.getElementById('finalV'),vl,'#9d8bc4',VALUES.map(v=>v.n));},0);document.getElementById('restartBtn').onclick=reset;document.getElementById('exportBtn').onclick=exportMap;}
function wrapText(t,p){const out=[];let cur='';for(const ch of t){cur+=ch;if(cur.length>=p){out.push(cur);cur='';}}if(cur)out.push(cur);return out;}
